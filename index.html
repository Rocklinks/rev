<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="https://www.sathya.store/favicon.webp">
<title>Sathya Agencies — Review Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--border2:#cbd5e1;--text:#1e293b;--text2:#475569;--muted:#94a3b8;--indigo:#4f46e5;--indigo2:#6366f1;--teal:#0d9488;--green:#059669;--amber:#d97706;--rose:#e11d48;--mono:"DM Mono",monospace;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Plus Jakarta Sans",sans-serif;font-size:14px;min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border),0 2px 8px rgba(0,0,0,.04);gap:10px}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.topbar h1{font-size:17px;font-weight:700;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
#clock{font-family:var(--mono);font-size:12px;color:var(--text);background:var(--surface2);padding:5px 10px;border-radius:7px;border:1px solid var(--border2);font-weight:700;white-space:nowrap}
.hamburger{display:none;width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px;flex-shrink:0}
.hamburger span{display:block;width:16px;height:2px;background:var(--text2);border-radius:2px}
.btn{padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-export{background:linear-gradient(135deg,var(--green),var(--teal));color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.25)}
.btn-export:hover{transform:translateY(-1px)}
.btn-red{background:rgba(225,29,72,.1);color:var(--rose);border:1px solid rgba(225,29,72,.2)}
.btn-red:hover{background:var(--rose);color:#fff}
.btn-green{background:rgba(5,150,105,.1);color:var(--green);border:1px solid rgba(5,150,105,.2)}
.btn-green:hover{background:var(--green);color:#fff}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--green);font-weight:600;white-space:nowrap}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;transition:transform .25s ease}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sidebar-overlay.show{display:block}
.s-group{margin-bottom:14px}
.s-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin-bottom:5px;font-weight:600}
.s-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text2);transition:.12s;font-weight:500;text-decoration:none}
.s-item:hover{background:var(--surface2);color:var(--text)}
.s-item.active{background:rgba(79,70,229,.08);color:var(--indigo)}
.s-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--surface2);flex-shrink:0;border:1px solid var(--border)}
.s-item.active .s-icon{background:rgba(79,70,229,.12);border-color:rgba(79,70,229,.2)}
.s-count{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--muted)}

.main-content{flex:1;padding:20px;overflow:auto;min-width:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.07}
.kpi-1 .kpi-icon{background:rgba(79,70,229,.1)}.kpi-1 .kpi-glow{background:var(--indigo)}
.kpi-2 .kpi-icon{background:rgba(5,150,105,.1)}.kpi-2 .kpi-glow{background:var(--green)}
.kpi-3 .kpi-icon{background:rgba(217,119,6,.1)}.kpi-3 .kpi-glow{background:var(--amber)}
.kpi-4 .kpi-icon{background:rgba(13,148,136,.1)}.kpi-4 .kpi-glow{background:var(--teal)}

.section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.section-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;background:var(--surface2)}
.section-title{font-weight:700;font-size:14px;color:var(--text)}
.ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select.fsel{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:.12s;user-select:none}
.chip:hover{border-color:var(--border2);background:var(--surface)}
.chip.selected{border-color:var(--indigo);background:rgba(79,70,229,.1);color:var(--indigo)}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
thead th:hover{color:var(--text2)}
tbody tr{border-bottom:1px solid var(--border);transition:.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(79,70,229,.03)}
tbody td{padding:11px 14px;white-space:nowrap}
.td-b{font-weight:600;color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono)}
.b-indigo{background:rgba(79,70,229,.1);color:var(--indigo)}
.b-green{background:rgba(5,150,105,.1);color:var(--green)}
.b-amber{background:rgba(217,119,6,.1);color:var(--amber)}
.b-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.stars{color:var(--amber);letter-spacing:-1px}
.agm-row td{background:rgba(79,70,229,.04);color:var(--indigo);font-weight:700;font-size:12px;padding:8px 14px}

.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-lbl{width:110px;font-size:12px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-val{width:40px;font-size:11px;font-family:var(--mono);color:var(--muted)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}

.agm-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.agm-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.agm-card-name{font-size:16px;font-weight:700;color:var(--indigo)}
.agm-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.agm-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.agm-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:2px}
.agm-stat-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--text)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(5px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:500px;overflow:hidden}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.modal-title{font-size:15px;font-weight:700}
.modal-close{width:30px;height:30px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface2)}
.fmt-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.fmt-btn{padding:10px;border:2px solid var(--border);border-radius:11px;background:var(--surface2);cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text2)}
.fmt-btn:hover{border-color:var(--border2);background:var(--surface)}
.fmt-btn.active{border-color:var(--green);background:rgba(5,150,105,.08);color:var(--green)}
.field-group{margin-bottom:16px}
.field-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;display:block}
.field-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}
.msel{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:8px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer}
.export-preview{background:rgba(79,70,229,.05);border:1px solid rgba(79,70,229,.15);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--text2);display:flex;align-items:flex-start;gap:9px;margin-top:2px;line-height:1.6}
.export-preview b{color:var(--indigo)}

/* Panel */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:200;backdrop-filter:blur(2px)}
.overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.panel{background:#fff;border-radius:16px;width:100%;max-width:760px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.panel-head{padding:20px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.panel-head h2{font-size:16px;font-weight:700}
.panel-close{background:#f1f5f9;border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;color:#64748b;display:flex;align-items:center;justify-content:center}
.panel-close:hover{background:#e2e8f0}
.panel-body{padding:20px 24px}
.review-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.review-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.reviewer{font-weight:700;font-size:14px;color:#1a1a2e}
.review-branch{font-size:11px;color:#94a3b8;margin-top:2px}
.review-meta{text-align:right}
.review-stars{color:#f59e0b;font-size:13px}
.review-date{font-size:11px;color:#94a3b8;margin-top:2px}
.review-text{font-size:13px;color:#475569;line-height:1.55;margin-top:8px}
.no-data{text-align:center;padding:48px;color:#94a3b8;font-size:14px}
.live-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.live-name{font-weight:600;font-size:14px;color:#1a1a2e}
.live-agm{font-size:11px;color:#94a3b8;margin-top:2px}
.live-new{font-size:22px;font-weight:800;color:#10b981}
.live-sub{font-size:11px;color:#94a3b8}
.agm-section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;border-bottom:1px solid #e2e8f0;margin:14px 0 8px}
.agm-section-head h3{font-size:13px;font-weight:700;color:#4f46e5}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:60px;left:0;bottom:0;z-index:95;transform:translateX(-100%);width:240px;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.mob-open{transform:translateX(0)}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .charts-row{grid-template-columns:1fr}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:1fr}
  .topbar h1{display:none}
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- EXPORT MODAL -->
<div class="modal-bg" id="expModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Export Report</div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Format</label>
        <div class="fmt-toggle">
          <button class="fmt-btn active" id="fmtXls" onclick="setFmt('xls')">&#x1F4CA; Excel (.xlsx)</button>
          <button class="fmt-btn" id="fmtCsv" onclick="setFmt('csv')">&#x1F4C4; CSV</button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Date Selection</label>
        <select class="msel" id="expDate" onchange="updatePreview()"></select>
        <div class="field-hint">Exports all branch data for the chosen date.</div>
      </div>
      <div class="field-group">
        <label class="field-label">Filter by AGM (optional)</label>
        <div class="chip-row" id="expAgmChips"></div>
      </div>
      <div class="export-preview">
        <span>&#x1F4CB;</span>
        <div id="expPreview">Select options above...</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" style="border:1px solid var(--border);background:var(--surface);color:var(--text2)" onclick="closeModal()">Cancel</button>
      <button class="btn btn-export" onclick="runExport()">&#x2B07; Export</button>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <img src="https://www.sathya.store/new_frontend/assets/img/sathya.webp" alt="Sathya" style="height:34px;object-fit:contain">
    <h1>Review Tracker</h1>
    <span class="live-pill"><span class="live-dot"></span>Auto-updated nightly</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-red" onclick="openLive()">&#128308; Live</button>
    <button class="btn btn-export" onclick="openModal()">&#x2B07; Export</button>
    <span id="clock"></span>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="s-group">
      <div class="s-label">Navigation</div>
      <div class="s-item active" onclick="showView('dashboard',this)"><span class="s-icon">&#x1F4CA;</span>Dashboard</div>
      <div class="s-item" onclick="showView('branches',this)"><span class="s-icon">&#x1F3E2;</span>All Branches<span class="s-count" id="sCountBranches"></span></div>
      <div class="s-item" onclick="showView('agm',this)"><span class="s-icon">&#x1F464;</span>By AGM<span class="s-count" id="sCountAgm"></span></div>
    </div>
    <div class="s-group">
      <div class="s-label">Tools</div>
      <div class="s-item" onclick="openReviews()"><span class="s-icon">&#128269;</span>Reviews</div>
    </div>
    <div class="s-group">
      <div class="s-label">Filter by AGM</div>
      <div id="agmSidebar"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">
    <div class="no-data"><span class="spin"></span> Loading data...</div>
  </div>
</div>

<!-- Reviews Panel -->
<div class="overlay" id="reviewsOverlay" onclick="if(event.target===this)closePanel('reviewsOverlay')">
  <div class="panel">
    <div class="panel-head">
      <h2>&#128269; Reviews</h2>
      <button class="panel-close" onclick="closePanel('reviewsOverlay')">&#10005;</button>
    </div>
    <div class="panel-body" id="reviewsBody"><div class="no-data">Loading...</div></div>
  </div>
</div>

async function init(){
  buildAgmSidebar();
  try{
    const r=await fetch("scraper/reviews.json?t="+Date.now());
    D=await r.json();
    const dates=Object.keys(D.daily||{}).sort();
    if(dates.length) selDate=dates[dates.length-1];
    showView("dashboard",document.querySelector(".s-item"));
  }catch(e){
    document.getElementById("mainContent").innerHTML='<div class="no-data">No data yet. Run the scraper first.</div>';
  }

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("mob-open");
  document.getElementById("sbOverlay").classList.toggle("show");
}
function closeSidebar(){document.getElementById("sidebar").classList.remove("mob-open");document.getElementById("sbOverlay").classList.remove("show")}

function buildAgmSidebar(){
  const w=document.getElementById("agmSidebar");
  w.innerHTML=AGMS.map(a=>`<div class="s-item" onclick="filterAgm('${a}',this)" id="agmSb_${a}"><span class="s-icon" style="font-size:10px;color:${AGM_COLORS[AGMS.indexOf(a)%6]}">&#9679;</span>${a}</div>`).join("");
}
function filterAgm(agm,el){
  if(activeAgm===agm){activeAgm=null;document.querySelectorAll("#agmSidebar .s-item").forEach(x=>x.classList.remove("active"));}
  else{activeAgm=agm;document.querySelectorAll("#agmSidebar .s-item").forEach(x=>x.classList.remove("active"));el.classList.add("active");}
  renderCurrentView();
}

function showView(view,el){
  currentView=view;
  document.querySelectorAll(".s-item").forEach(x=>x.classList.remove("active"));
  if(el)el.classList.add("active");
  closeSidebar();
  renderCurrentView();
}

function renderCurrentView(){
  if(!D)return;
  if(currentView==="dashboard") renderDashboard();
  else if(currentView==="branches") renderBranches();
  else if(currentView==="agm") renderAgmView();
}

function getDateSnap(date){
  date=date||selDate;
  return D.daily?.[date]||{};
}

function getFiltered(){
  return BRANCHES.filter(b=>!activeAgm||b.agm===activeAgm);
}

function computeStats(filtered,day){
  let total=0,todayNew=0,monthly=0,sSum=0,sCnt=0,ok=0;
  const branches=D.branches||{};
  filtered.forEach(b=>{
    const bid=String(b.id);
    const dy=day[bid]||{};const br=branches[bid]||{};
    const t=dy.total_snap||br.overall||0;
    if(t){total+=t;ok++;}
    todayNew+=dy.daily_count||0;
    monthly+=dy.monthly||br.monthly||0;
    const s=dy.star_rating||br.star_rating||0;
    if(s){sSum+=s;sCnt++;}
  });
  return{total,todayNew,monthly,avgStars:sCnt?(sSum/sCnt).toFixed(1):0,ok};
}

function renderDashboard(){
  const filtered=getFiltered();
  const day=getDateSnap();
  const s=computeStats(filtered,day);

  </div>`;

  // Date filter for dashboard
  let dateOptsDash=dates.map(d=>`<option value="${d}"${d===selDate?" selected":""}>${d}</option>`).join("");
  html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px">
    <span style="font-size:13px;font-weight:600;color:var(--text)">&#x1F4C5; Filter by Date:</span>
    <select class="fsel" onchange="selDate=this.value;renderCurrentView()" style="margin:0">${dateOptsDash}</select>
  </div>`;

  // Charts
  const branches=D.branches||{};
  const topBranches=filtered.map(b=>{
    const bid=String(b.id);
    const dy=day[bid]||{};const br=branches[bid]||{};
    return{name:b.name,total:dy.total_snap||br.overall||0};
  }).sort((a,b)=>b.total-a.total).slice(0,10);
  const maxTotal=topBranches[0]?.total||1;

  html+=`<div class="charts-row">
    <div class="chart-card"><div class="chart-title">Top 10 Branches by Reviews</div><div class="bar-chart">`;
  topBranches.forEach((b,i)=>{
    const pct=Math.round(b.total/maxTotal*100);
    const color=AGM_COLORS[i%6];
    html+=`<div class="bar-row"><div class="bar-lbl">${b.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-val">${b.total.toLocaleString()}</div></div>`;
  });
  html+=`</div></div>`;

  // AGM summary chart
  const agmData={};
  filtered.forEach(b=>{
    const bid=String(b.id);
    const dy=day[bid]||{};const br=branches[bid]||{};
    if(!agmData[b.agm]) agmData[b.agm]={total:0,count:0};
    agmData[b.agm].total+=dy.total_snap||br.overall||0;
    agmData[b.agm].count++;
  });
  const agmEntries=Object.entries(agmData).sort((a,b)=>b[1].total-a[1].total);
  const maxAgm=agmEntries[0]?.[1].total||1;

  html+=`<div class="chart-card"><div class="chart-title">Reviews by AGM</div><div class="bar-chart">`;
  agmEntries.forEach(([agm,d],i)=>{
    const pct=Math.round(d.total/maxAgm*100);

  });

    const daily=dy.daily_count||0;
    const monthly=dy.monthly||br.monthly||0;

    const starsHtml=stars?`<span class="stars">${"\u2605".repeat(Math.round(stars))}${"\u2606".repeat(5-Math.round(stars))}</span> <strong>${stars}</strong>`:'<span style="color:var(--muted)">—</span>';

  });
  html+=`</tbody></table></div></div>`;
  mc.innerHTML=html;
}

function setExpAgm(a,el){expAgm=a;el.parentElement.querySelectorAll(".chip").forEach(c=>c.classList.remove("selected"));el.classList.add("selected");updatePreview()}
function updatePreview(){
  const date=document.getElementById("expDate").value;
  const branches=expAgm==="__all__"?BRANCHES:BRANCHES.filter(b=>b.agm===expAgm);
  const fmt=expFmt==="xls"?"Excel (.xlsx)":"CSV";
  document.getElementById("expPreview").innerHTML=`<b>${fmt}</b> &middot; <b>${branches.length}</b> branches &middot; Date: <b>${date}</b>`;

function runExport(){
  const date=document.getElementById("expDate").value;
  const day=D.daily?.[date]||{};
  const branches=D.branches||{};
  const filtered=expAgm==="__all__"?BRANCHES:BRANCHES.filter(b=>b.agm===expAgm);
  closeModal();

  if(expFmt==="csv"){
    let csv="#,Branch,AGM,Total Reviews,Daily New,Monthly,Stars\n";
    filtered.forEach(b=>{
      const bid=String(b.id);const dy=day[bid]||{};const br=branches[bid]||{};
      csv+=`${b.id},"${b.name}","${b.agm}",${dy.total_snap||br.overall||0},${dy.daily_count||0},${dy.monthly||br.monthly||0},${dy.star_rating||br.star_rating||0}\n`;
    });
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`reviews_${date}.csv`;a.click();
  } else {
    const header=["#","Branch","AGM","Total Reviews","Daily New","Monthly","Stars"];
    const rows=filtered.map(b=>{
      const bid=String(b.id);const dy=day[bid]||{};const br=branches[bid]||{};
      return[b.id,b.name,b.agm,dy.total_snap||br.overall||0,dy.daily_count||0,dy.monthly||br.monthly||0,dy.star_rating||br.star_rating||0];
    });
    const totalRow=["","","TOTAL",rows.reduce((s,r)=>s+r[3],0),rows.reduce((s,r)=>s+r[4],0),rows.reduce((s,r)=>s+r[5],0),""];
    const ws=XLSX.utils.aoa_to_sheet([header,...rows,totalRow]);
    ws["!cols"]=[{wch:4},{wch:22},{wch:14},{wch:14},{wch:10},{wch:10},{wch:8}];
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Reviews");
    XLSX.writeFile(wb,`reviews_${date}.xlsx`);
  }
}

async function runLiveScraper(){
  let token=getGhToken();
  if(!token){
    token=prompt("Enter your GitHub PAT (with repo + actions:write scopes):");
    if(!token)return;
    setGhToken(token.trim());
  }
  const btn=document.getElementById("liveRunBtn");
  const body=document.getElementById("liveScraperBody");
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Starting...';

  try{
    const triggerResp=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/live.yml/dispatches`,{
      method:"POST",
      headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"},
      body:JSON.stringify({ref:"main"})
    });
    if(!triggerResp.ok && triggerResp.status!==204){
      const err=await triggerResp.json().catch(()=>({}));
      if(triggerResp.status===401||triggerResp.status===403){
        setGhToken("");
        throw new Error("Invalid token. Please try again.");
      }
      throw new Error(err.message||"Failed to trigger workflow ("+triggerResp.status+")");
    }

    body.innerHTML=`<div style="text-align:center;padding:20px">
      <span class="spin" style="width:20px;height:20px;border-width:3px"></span>
      <p style="margin-top:12px;color:var(--text);font-size:13px;font-weight:600">Workflow triggered. Waiting for run to appear...</p>
      <p id="liveProgress" style="margin-top:6px;color:var(--muted);font-size:12px">Checking...</p>
    </div>`;

    await new Promise(r=>setTimeout(r,3000));
    let runId=null, attempts=0;
    while(attempts<30 && !runId){
      const runsResp=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/live.yml/runs?per_page=1`,{
        headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}
      });
      const runsData=await runsResp.json();
      const latest=runsData.workflow_runs?.[0];
      if(latest && latest.created_at > new Date(Date.now()-120000).toISOString()){
        runId=latest.id;
      }else{
        attempts++;
        document.getElementById("liveProgress").textContent=`Searching for workflow run... (${attempts})`;
        await new Promise(r=>setTimeout(r,2000));
      }
    }
    if(!runId) throw new Error("Could not detect workflow run. Check the Actions tab on GitHub.");

    let status="queued", elapsed=0;
    while(status!=="completed" && elapsed<300){
      await new Promise(r=>setTimeout(r,5000));
      elapsed+=5;
      const stResp=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/runs/${runId}`,{
        headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}
      });
      const stData=await stResp.json();
      status=stData.status||"unknown";
      const concl=stData.conclusion||"";
      document.getElementById("liveProgress").textContent=`Status: ${status}${concl?" ("+concl+")":""} \u00B7 ${elapsed}s elapsed`;
      if(status==="completed"){
        if(concl!=="success") throw new Error("Workflow finished with status: "+concl);
        break;
      }
    }
    if(status!=="completed") throw new Error("Workflow timed out after 5 minutes.");

    document.getElementById("liveProgress").textContent="Workflow done. Loading results...";
    await new Promise(r=>setTimeout(r,2000));
    const fresh=await fetch("scraper/live_data.json?t="+Date.now());
    if(!fresh.ok) throw new Error("Could not load live_data.json");
    const ld=await fresh.json();
    renderLiveResults(ld);
  }catch(e){
    body.innerHTML=`<div style="text-align:center;padding:30px">
      <p style="color:var(--rose);font-size:14px;font-weight:600;margin-bottom:8px">${e.message}</p>
      <button onclick="runLiveScraper()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer">Retry</button>
    </div>`;
  }
  btn.disabled=false; btn.innerHTML='&#9654; Run Scraper';
}

function renderLiveResults(ld){
  const body=document.getElementById("liveScraperBody");
  const runTime=ld.run_time?new Date(ld.run_time).toLocaleString("en-IN",{timeZone:"Asia/Kolkata"}):"Never";
  const todayLabel=ld.today||"—";

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
    <div>
      <p style="color:var(--muted);font-size:12px">Last scraped: ${runTime}</p>
      <p style="color:var(--text);font-size:13px;font-weight:600;margin-top:4px">Date: ${todayLabel}</p>
    </div>
  </div>`;

  const groups=activeAgm?{[activeAgm]:ld.agm_summary?.[activeAgm]}:ld.agm_summary||{};
  Object.entries(groups).forEach(([agm,g])=>{
    if(!g)return;
    html+=`<div class="agm-section-head"><h3>&#x1F464; ${agm}</h3><span class="badge b-green">+${g.total_today} new</span></div>`;
    html+=`<div class="tbl-wrap"><table><thead><tr><th>Branch</th><th>Total</th><th>Baseline</th><th>Today</th><th></th></tr></thead><tbody>`;
    (g.branches||[]).forEach(b=>{
      const diff=(b.total||0)-(b.baseline||0);
      const diffBadge=diff>0?`<span class="badge b-green">+${diff}</span>`:diff<0?`<span class="badge" style="background:rgba(225,29,72,.1);color:var(--rose)">${diff}</span>`:'<span class="badge b-gray">0</span>';
      const mapsUrl=`https://www.google.com/maps/place/?q=place_id:${BRANCHES.find(x=>x.id===b.id)?.place_id||""}`;
      html+=`<tr>
        <td class="td-b">${b.name}</td>
        <td><strong>${(b.total||0).toLocaleString()}</strong></td>
        <td style="color:var(--muted)">${(b.baseline||0).toLocaleString()}</td>
        <td><strong style="color:var(--green)">+${b.today_count||0}</strong></td>
        <td>${diffBadge}</td>
        <td><a href="${mapsUrl}" target="_blank" style="font-size:11px;color:var(--indigo);text-decoration:none">Maps &#8599;</a></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  if(!html.includes("agm-section-head")) html+='<div class="no-data">No data available.</div>';
  body.innerHTML=html;
}

// ── REVIEWS PANEL ────────────────────────────────────────────
let rvAll=[], rvFDate="__all__", rvSelBranch=null;

async function openReviews(){
  document.getElementById("reviewsOverlay").classList.add("open");
  const body=document.getElementById("reviewsBody");
  body.innerHTML='<div class="no-data"><span class="spin"></span> Loading reviews...</div>';
  try{
    const r=await fetch("scraper/reviews_detail/all_reviews.json?t="+Date.now());
    if(!r.ok)throw new Error("No reviews data");
    const all=await r.json();
    rvAll=Array.isArray(all)?all:[];
    rvFDate="__all__"; rvSelBranch=null;
    renderReviews();
  }catch(e){body.innerHTML=`<div class="no-data">${e.message}</div>`;}
}

function renderReviews(){
  if(rvSelBranch) return renderBranchReviews();
  const body=document.getElementById("reviewsBody");
  const dates=[...new Set(rvAll.map(r=>r.date||r._date))].sort().reverse();

  let filtered=rvAll;
  if(rvFDate!=="__all__") filtered=filtered.filter(r=>(r.date||r._date)===rvFDate);

  // Aggregate by branch
  const byBranch={};
  filtered.forEach(r=>{
    const b=r.branch_name||"Unknown";
    if(!byBranch[b]) byBranch[b]={branch:b, agm:r.agm||"", count:0, stars:[]};
    byBranch[b].count++;
    if(r.stars) byBranch[b].stars.push(r.stars);
  });
  const branches=Object.values(byBranch).sort((a,b)=>b.count-a.count);

  let h=`<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #e2e8f0">
    <div style="display:flex;flex-direction:column;gap:4px">
      <label style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Date</label>
      <select onchange="rvFDate=this.value;renderReviews()" style="background:#f8fafc;border:1px solid #e2e8f0;color:#1a1a2e;padding:6px 10px;border-radius:7px;font-size:12px;min-width:120px">
        <option value="__all__"${rvFDate==="__all__"?" selected":""}>All Dates</option>
        ${dates.map(d=>`<option value="${d}"${rvFDate===d?" selected":""}>${d}</option>`).join("")}
      </select>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <label style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Total</label>
      <div style="padding:6px 10px;font-size:13px;font-weight:700;color:#1a1a2e">${branches.reduce((s,b)=>s+b.count,0)} reviews &middot; ${branches.length} branches</div>
    </div>
  </div>`;

  if(!branches.length){h+='<div class="no-data">No reviews found.</div>';body.innerHTML=h;return;}

  // Group by AGM
  const byAgm={};
  branches.forEach(b=>{const a=b.agm||"Unknown";if(!byAgm[a])byAgm[a]=[];byAgm[a].push(b);});

  Object.keys(byAgm).sort().forEach(agm=>{
    const brs=byAgm[agm];
    const agmTotal=brs.reduce((s,b)=>s+b.count,0);
    h+=`<div class="agm-section-head"><h3>&#x1F464; ${agm}</h3><span class="badge b-indigo">${agmTotal} reviews</span></div>`;
    h+=`<div style="margin-bottom:20px"><table style="width:100%">
      <thead><tr><th style="text-align:left">Branch</th><th style="text-align:center">Reviews</th><th style="text-align:center">Avg Stars</th><th></th></tr></thead>
      <tbody>`;
    brs.sort((a,b)=>b.count-a.count).forEach(b=>{
      const avg=b.stars.length?(b.stars.reduce((s,v)=>s+v,0)/b.stars.length).toFixed(1):"—";
      const starStr=b.stars.length?`\u2605${avg}`:"";
      h+=`<tr style="cursor:pointer;border-bottom:1px solid #f1f5f9" onclick="rvSelBranch='${b.branch.replace(/'/g,"\\'")}';renderReviews()">
        <td style="padding:10px 12px;font-weight:600;color:#1a1a2e;font-size:13px">${b.branch}</td>
        <td style="padding:10px 12px;text-align:center;font-family:var(--mono);font-weight:700;color:#6366f1;font-size:13px">${b.count}</td>
        <td style="padding:10px 12px;text-align:center;color:#f59e0b;font-size:13px;font-weight:600">${starStr}</td>
        <td style="padding:10px 12px;text-align:right;font-size:11px;color:#94a3b8">\u25B6</td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  });
  body.innerHTML=h;
}

function renderBranchReviews(){
  const body=document.getElementById("reviewsBody");
  const revs=rvAll.filter(r=>r.branch_name===rvSelBranch);
  const agm=revs.length?revs[0].agm:"";
  const stars=revs.filter(r=>r.stars).map(r=>r.stars);
  const avg=stars.length?(stars.reduce((s,v)=>s+v,0)/stars.length).toFixed(1):"—";

  let h=`<div style="margin-bottom:16px">
    <span onclick="rvSelBranch=null;renderReviews()" style="cursor:pointer;color:#6366f1;font-size:13px;font-weight:600">\u2190 Back to all branches</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px">
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--text)">${rvSelBranch}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">&#x1F464; ${agm} &middot; ${revs.length} reviews &middot; \u2605 ${avg}</div>
    </div>
  </div>`;

  if(!revs.length){h+='<div class="no-data">No reviews found for this branch.</div>';body.innerHTML=h;return;}

  revs.sort((a,b)=>(b.stars||0)-(a.stars||0)).forEach(r=>{
    const s="\u2605".repeat(r.stars||0)+"\u2606".repeat(5-(r.stars||0));
    h+=`<div class="review-card"><div class="review-top"><div><div class="reviewer">${r.reviewer||"Anonymous"}</div></div><div class="review-meta"><div class="review-stars">${s}</div></div></div>${r.text?`<div class="review-text">${r.text}</div>`:""}</div>`;
  });
  body.innerHTML=h;
}

document.addEventListener("keydown",e=>{if(e.key==="Escape"){closePanel("reviewsOverlay");}});
init();
</script>
</body>
