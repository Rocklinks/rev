name: Live Tracker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install playwright && playwright install chromium --with-deps

      - name: Run live tracker
        run: python scraper/live_tracker.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/live_data.json scraper/live_reviews/ || true
          git diff --staged --quiet || git commit -m "live: $(date -u +%Y-%m-%dT%H:%M)" && git push
