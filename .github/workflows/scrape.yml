name: Google Reviews Scraper

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install playwright && playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/reviews.json scraper/reviews_detail/ scraper/live_data.json scraper/live_reviews/ || true
          git diff --staged --quiet || git commit -m "reviews: $(date -u +%Y-%m-%d)" && git push
